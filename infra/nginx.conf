server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — anything not matching a file maps to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed assets, no-cache the entry HTML.
  location ~* \.(?:js|css|woff2?|svg|ico|png|jpg|jpeg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
